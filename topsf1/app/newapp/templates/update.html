<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome</title>
</head>

<body style="background-color: aliceblue;">
    <h1 style="text-align: center;color: blue;">Updatedata</h1>
    <hr>
    <form method="post">
        {%csrf_token%}
        <input type="text" value="{{stid.name}}" name="name" placeholder="Name"> <br><br>
        <input type="email" value="{{stid.email}}" name="email" placeholder="Email"> <br><br>
        <input type="date" name="dob" value="{{stid.dob|date:'Y-m-d'}}" placeholder="dob"> <br><br>
        <input type="number" name="mobil" value="{{stid.mobil}}" placeholder="Mobil"> <br><br>
        <textarea name="address" id="" placeholder="Address">{{stid.address}}</textarea> <br><br>
        <input type="submit">
    </form>
    <hr>
    <a href="/showdata">Showdata</a>
</body>

</html>
